
{% extends 'base.html' %}

{% block title %}Create or join game{% endblock %}

{% block content %}
    <div class="h-screen w-screen flex items-center justify-center bg-emerald-800 text-white">
        <div class="w-full max-w-md">
            <h2 class="text-3xl font-extrabold tracking-tight mb-8">Neuer Spieler</h2>
            
            <form class="space-y-6" action="" method="post">
                <input type="hidden" name="type" value="create">

                <div>
                    <label for="name" class="block text-sm font-medium text-gray-200 mb-1">Dein Name</label>
                    <input type="text" id="name" name="name" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none">
                </div>

                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2 px-4 rounded-lg shadow-sm">
                    Erstellen
                </button>
            </form>
        </div>
    </div>
{% endblock %}
